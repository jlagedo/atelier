[project]
name = "partisan"
version = "0.1.0"
description = "Atelier in-guest AI agent (Python/OpenHands) — successor to artisan"
requires-python = ">=3.12"
dependencies = [
    "openhands-sdk==1.23.*",
    "openhands-tools==1.23.*",
]

[dependency-groups]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.24",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
