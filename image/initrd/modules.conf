# Kernel modules the boot initramfs must load before mounting the real root
# (design.md §7 "Must-have drivers"). Required because a generic Ubuntu kernel
# ships these as modules (=m); a built-in (=y) kernel could skip the initrd.
#
# REFERENCE ONLY (S1.3): the bundle currently ships the FULL initramfs-tools
# initrd (default MODULES=most, like Cowork's), so this list is not wired into the
# build — every driver below is already included. Kept for a future lean initrd
# variant (set MODULES=list + feed this file to mkinitramfs).

# Hyper-V VMBus transport
hv_vmbus
hv_storvsc
hv_netvsc
hv_sock

# virtio devices (blk/scsi + virtio-fs)
virtio
virtio_pci
virtio_blk
virtio_scsi
virtiofs

# host<->guest file share
9pnet
9pnet_virtio
9p

# filesystems
ext4
fuse
overlay
